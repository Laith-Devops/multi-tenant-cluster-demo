{{- range .Values.tenants }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nginx-hpa-{{ .name }}
  namespace: {{ .name }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nginx-{{ .name }}
  minReplicas: {{ $.Values.nginx.hpa.minReplicas }}
  maxReplicas: {{ $.Values.nginx.hpa.maxReplicas }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ $.Values.nginx.hpa.cpuUtilization }}
---
{{- end }}
